<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enyimba Za Kristo</title>
    <!-- <link rel="stylesheet" href="../style/stylem.css"> -->
	<link rel="shortcut icon" type="image/png" href="images/app.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Ennyimba Za Kristo">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="apple-touch-icon" href="images/app.png">
	<link rel="stylesheet" href="../style/stylem.css">
    <script src="../js/js.js"></script>
    <script>
        function go(){
            var link = document.getElementById('hym');
            var t = document.getElementById('num');
            var x = num.value;
            if(!x || x == 0){
                link.href = "#";
				document.getElementById('alert_container').style.display='block';
            }
            else{
                // link.href = "pages/"+x*1+".html"
                link.href = `/songs.html?song=${x*1}`;
            }
        }
    </script>
</head>
<body>
    <div class="calc">
        <header class="menu-appbar">
            <a class="menu-appbar__link" href="../index.html" aria-label="Go to main menu">
                <span class="menu-appbar__chevron" aria-hidden="true">&#8249;</span>
                <span>Main menu</span>
            </a>
            <div class="menu-appbar__title">Jump to Hymn</div>
            <a class="menu-appbar__link menu-appbar__link--secondary" href="index.html">Index</a>
        </header>
        <div class="form">
            <div class="txtview" id="txt">
                <p>New Luganda Hymnal</p>
            </div>
            <div class="input">
                <div><input id="num" readonly></div>
            </div>
        </div>
        <div id="tbl" class="keypad">
            <div class="keypad__row">
                <input class="btni" type="button" value="1" onclick="inser(1)">
                <input class="btni" type="button" value="2" onclick="inser(2)">
                <input class="btni" type="button" value="3" onclick="inser(3)">
            </div>
            <div class="keypad__row">
                <input class="btni" type="button" value="4" onclick="inser(4)">
                <input class="btni" type="button" value="5" onclick="inser(5)">
                <input class="btni" type="button" value="6" onclick="inser(6)">
            </div>
            <div class="keypad__row">
                <input class="btni" type="button" value="7" onclick="inser(7)">
                <input class="btni" type="button" value="8" onclick="inser(8)">
                <input class="btni" type="button" value="9" onclick="inser(9)">
            </div>
            <div class="keypad__row keypad__row--actions">
                <button class="a" type="button" onclick="backSpace()">Del</button>
                <input class="btni" type="button" value="0" onclick="inser(0)">
                <a id="hym" onclick="go()"><button>Open</button></a>
            </div>
            <div class="keypad__row keypad__row--full">
                <a class="go_to" href="index.html"><button>Index <br> <small>&copy;KitaRogHope</small></button></a>
            </div>
        </div>
    </div>
		<div id="alert_container" onclick="style.display='none'">
			<div class="alert">
                <div>
                    <span class="closebtn" onclick="document.getElementById('alert_container').style.display='none';">&times;</span> 
                    <strong>Nedda!</strong> Enyimba zivva ku namba 1 paka ku 250. Bwoba oyagala z'abaana, ddayo emabega olabe "Enyimba Z'abaana"
                </div>
            </div>
		</div>
	<script>
		backSpace = function (){
			var str= document.getElementById("num").value;
			var position = document.getElementById('num').selectionStart-1;

			str = str.substr(0, position) + '' + str.substr(position + 1);
			document.getElementById("num").value = str;
			
            return;
		}
	</script>
</body>
</html>
